# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch that touch the site or this workflow
  push:
    branches: ["main"]
    paths:
      - "htdocs/**"
      - ".github/workflows/static.yml"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Validate markup and links before deploying
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Validate HTML
        run: npx --yes html-validate "htdocs/**/*.html"
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          # web.archive.org is slow/rate-limited and would cause flaky failures
          args: --no-progress --exclude 'web\.archive\.org' 'htdocs/**/*.html'
          fail: true

  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload static site from htdocs directory
          path: 'htdocs'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
